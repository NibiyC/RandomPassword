<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>随机密码生成器</title>
  <style>
    :root {
      --blue: #0071e3;
      --blue-hover: #0066cc;
      --ink: #0b1f2a;
      --muted: #66727f;
      --line: rgba(120, 140, 160, 0.28);
      --line-strong: rgba(90, 112, 132, 0.36);
      --page: #f5f7f9;
      --card: rgba(255, 255, 255, 0.74);
      --red: #d92d20;
      --orange: #f59e0b;
      --green: #65b741;
      --green-strong: #20b758;
      --teal: #009c8c;
      --ease: cubic-bezier(.22, 1, .36, 1);
      --shadow-soft: 0 18px 45px rgba(16, 32, 48, 0.08);
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      width: 100%;
      min-height: 100%;
      color: var(--ink);
      background:
        radial-gradient(circle at 50% -10%, rgba(255, 255, 255, 1) 0, rgba(245, 247, 249, 0.92) 42%, rgba(241, 244, 247, 1) 100%),
        var(--page);
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "SF Pro Text", "Segoe UI", "PingFang SC", "Microsoft YaHei", Arial, sans-serif;
    }

    body {
      height: 100vh;
      overflow: hidden;
    }

    body.result-ready {
      height: auto;
      min-height: 100vh;
      overflow-y: auto;
      overflow-x: hidden;
    }

    body::-webkit-scrollbar {
      width: 11px;
    }

    body::-webkit-scrollbar-track {
      background: transparent;
    }

    body::-webkit-scrollbar-thumb {
      background: rgba(116, 128, 142, 0.3);
      border: 3px solid rgba(245, 247, 249, 0.95);
      border-radius: 999px;
    }

    body::-webkit-scrollbar-thumb:hover {
      background: rgba(92, 105, 120, 0.48);
    }

    html {
      scrollbar-width: thin;
      scrollbar-color: rgba(116, 128, 142, 0.35) transparent;
    }

    button,
    input,
    textarea {
      font-family: inherit;
    }

    input[type="number"] {
      appearance: textfield;
      -moz-appearance: textfield;
    }

    input[type="number"]::-webkit-inner-spin-button,
    input[type="number"]::-webkit-outer-spin-button {
      -webkit-appearance: none;
      margin: 0;
    }

    button {
      -webkit-tap-highlight-color: transparent;
    }

    .page {
      width: 100%;
      min-height: 100vh;
      padding: 50px 48px 44px;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .page-header {
      text-align: center;
      animation: fadeUp 0.7s var(--ease) both;
    }

    .page-header h1 {
      margin: 0;
      font-size: clamp(38px, 4vw, 54px);
      line-height: 1.08;
      font-weight: 850;
      letter-spacing: -0.05em;
      color: #071926;
    }

    .page-header p {
      margin: 15px 0 0;
      font-size: 16px;
      line-height: 1.55;
      color: #1d2d38;
    }

    .c-pwd-gen {
      width: 100%;
      max-width: 1100px;
      margin-top: 58px;
      animation: fadeUp 0.85s var(--ease) 0.08s both;
    }

    .c-pwd-gen__container {
      width: 100%;
      display: grid;
      grid-template-columns: 370px minmax(0, 1fr);
      column-gap: 56px;
      align-items: center;
    }

    .c-pwd-gen__illustrations {
      position: relative;
      width: 370px;
      height: 266px;
      filter: drop-shadow(0 16px 26px rgba(28, 49, 70, 0.06));
      transition: transform 0.5s var(--ease), filter 0.5s var(--ease);
    }

    .c-pwd-gen__illustrations:hover {
      transform: translateY(-3px);
      filter: drop-shadow(0 20px 34px rgba(28, 49, 70, 0.1));
    }

    .c-pwd-gen__illustrations-image {
      position: absolute;
      inset: 0 auto auto 0;
      width: 370px;
      height: auto;
      display: none;
      user-select: none;
      pointer-events: none;
    }

    .c-pwd-gen[data-score="very-weak"] .c-pwd-gen__illustrations-image.c-pwd-gen--very-weak,
    .c-pwd-gen[data-score="weak"] .c-pwd-gen__illustrations-image.c-pwd-gen--weak,
    .c-pwd-gen[data-score="good"] .c-pwd-gen__illustrations-image.c-pwd-gen--good,
    .c-pwd-gen[data-score="strong"] .c-pwd-gen__illustrations-image.c-pwd-gen--strong,
    .c-pwd-gen[data-score="very-strong"] .c-pwd-gen__illustrations-image.c-pwd-gen--very-strong {
      display: block;
      animation: imageSoftIn 0.42s var(--ease) both;
    }

    .c-pwd-gen__main-fields {
      width: 100%;
      min-width: 0;
    }

    .preview-box {
      width: 100%;
      height: 56px;
      border: 1px solid var(--line-strong);
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.82);
      display: flex;
      align-items: center;
      gap: 18px;
      padding: 0 28px;
      box-shadow: 0 10px 30px rgba(10, 30, 45, 0.045);
      backdrop-filter: blur(18px);
      overflow: hidden;
      transition: transform 0.28s var(--ease), box-shadow 0.28s var(--ease), border-color 0.28s var(--ease);
    }

    .preview-box:hover {
      transform: translateY(-1px);
      border-color: rgba(0, 113, 227, 0.34);
      box-shadow: 0 16px 38px rgba(10, 30, 45, 0.075);
    }

    .preview-title {
      flex: 0 0 auto;
      color: var(--muted);
      font-size: 14px;
      font-weight: 750;
      white-space: nowrap;
    }

    .preview-password {
      flex: 1;
      min-width: 0;
      color: #050b10;
      font-size: 19px;
      font-weight: 850;
      letter-spacing: 0.2px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .c-pwd-gen__label {
      display: none;
      min-width: 48px;
      height: 24px;
      padding: 0 11px;
      border-radius: 8px;
      align-items: center;
      justify-content: center;
      color: #fff;
      font-size: 13px;
      line-height: 24px;
      font-weight: 850;
      white-space: nowrap;
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.2);
    }

    .c-pwd-gen[data-score="very-weak"] .c-pwd-gen__label.c-pwd-gen--very-weak,
    .c-pwd-gen[data-score="weak"] .c-pwd-gen__label.c-pwd-gen--weak,
    .c-pwd-gen[data-score="good"] .c-pwd-gen__label.c-pwd-gen--good,
    .c-pwd-gen[data-score="strong"] .c-pwd-gen__label.c-pwd-gen--strong,
    .c-pwd-gen[data-score="very-strong"] .c-pwd-gen__label.c-pwd-gen--very-strong {
      display: inline-flex;
    }

    .t-bg--red { background: var(--red); }
    .t-bg--light-orange { background: #f47b20; }
    .t-bg--pale-orange { background: var(--orange); }
    .t-bg--pale-green { background: var(--green); }
    .t-bg--bright-green { background: var(--green-strong); }

    .c-pwd-gen__settings {
      margin-top: 30px;
      display: grid;
      row-gap: 18px;
    }

    .c-pwd-gen__length-settings,
    .c-pwd-gen__complexity-settings,
    .c-pwd-gen__extra-settings {
      display: grid;
      grid-template-columns: 138px minmax(0, 1fr);
      column-gap: 42px;
      align-items: center;
      min-height: 50px;
    }

    .body2,
    .merged-label,
    .c-pwd-gen__complexity-label {
      color: #0a1b26;
      font-size: 15.5px;
      line-height: 1.3;
      font-weight: 520;
      white-space: nowrap;
    }

    .c-pwd-gen__length-label {
      display: inline-flex;
      align-items: baseline;
      white-space: nowrap;
    }

    .c-pwd-gen__length-value {
      margin-left: 6px;
      font-weight: 850;
    }

    .c-pwd-gen__slider-settings {
      width: 100%;
      max-width: 420px;
      display: grid;
      grid-template-columns: 42px minmax(0, 1fr) 42px;
      gap: 12px;
      align-items: center;
    }

    .c-pwd-gen__slider-settings-btn,
    .small-round-btn {
      width: 42px;
      height: 42px;
      border-radius: 50%;
      border: 1.2px solid rgba(7, 25, 38, 0.85);
      background: rgba(255, 255, 255, 0.52);
      color: #071926;
      padding: 0;
      cursor: pointer;
      position: relative;
      backdrop-filter: blur(14px);
      transition:
        transform 0.22s var(--ease),
        color 0.22s var(--ease),
        border-color 0.22s var(--ease),
        background 0.22s var(--ease),
        box-shadow 0.22s var(--ease),
        opacity 0.22s var(--ease);
    }

    .c-pwd-gen__slider-settings-btn:hover:not(:disabled),
    .small-round-btn:hover {
      color: var(--blue);
      border-color: rgba(0, 113, 227, 0.76);
      background: rgba(255, 255, 255, 0.92);
      box-shadow: 0 10px 24px rgba(0, 113, 227, 0.13);
      transform: translateY(-1px);
    }

    .c-pwd-gen__slider-settings-btn:active:not(:disabled),
    .small-round-btn:active {
      transform: scale(0.96);
    }

    .c-pwd-gen__slider-settings-btn:disabled {
      opacity: 0.32;
      cursor: not-allowed;
      transform: none;
      box-shadow: none;
    }

    .c-pwd-gen__minus,
    .c-pwd-gen__plus,
    .small-round-btn.minus::before,
    .small-round-btn.plus::before,
    .small-round-btn.plus::after {
      content: "";
      position: absolute;
      left: 50%;
      top: 50%;
      width: 14px;
      height: 1.5px;
      border-radius: 999px;
      background: currentColor;
      transform: translate(-50%, -50%);
    }

    .c-pwd-gen__plus::after {
      content: "";
      position: absolute;
      left: 50%;
      top: 50%;
      width: 1.5px;
      height: 14px;
      border-radius: 999px;
      background: currentColor;
      transform: translate(-50%, -50%);
    }

    .small-round-btn.plus::after {
      width: 1.5px;
      height: 14px;
    }

    .c-pwd-gen__slider-container {
      position: relative;
      height: 42px;
      display: flex;
      align-items: center;
    }

    .c-pwd-gen__slider-track {
      position: absolute;
      left: 21px;
      right: 21px;
      top: 50%;
      height: 7px;
      transform: translateY(-50%);
      border-radius: 999px;
      border: 1px solid rgba(155, 171, 187, 0.5);
      background: rgba(255, 255, 255, 0.86);
      overflow: hidden;
      pointer-events: none;
    }

    .c-pwd-gen__slider-fill {
      display: block;
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, #0071e3, #45a3ff);
      border-radius: inherit;
      transition: width 0.18s var(--ease);
    }

    .c-pwd-gen__slider-thumb {
      position: absolute;
      left: 21px;
      top: 50%;
      width: 42px;
      height: 42px;
      border-radius: 50%;
      border: 1.25px solid var(--blue);
      background: rgba(255, 255, 255, 0.96);
      transform: translate(-50%, -50%);
      pointer-events: none;
      z-index: 2;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--blue);
      box-shadow: 0 10px 24px rgba(0, 113, 227, 0.13);
      transition: left 0.18s var(--ease), box-shadow 0.18s var(--ease);
    }

    .c-pwd-gen__slider-thumb svg {
      width: 20px;
      height: 20px;
      display: block;
      stroke: currentColor;
    }

    .c-pwd-gen__slider {
      position: absolute;
      z-index: 3;
      left: 21px;
      width: calc(100% - 42px);
      height: 42px;
      margin: 0;
      appearance: none;
      -webkit-appearance: none;
      background: transparent;
      cursor: pointer;
      opacity: 0;
    }

    .c-pwd-gen__slider::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 42px;
      height: 42px;
    }

    .c-pwd-gen__slider::-moz-range-thumb {
      width: 42px;
      height: 42px;
      border: 0;
      background: transparent;
    }

    .batch-count-control {
      width: 100%;
      max-width: 320px;
      display: grid;
      grid-template-columns: 42px minmax(128px, 1fr) 42px;
      gap: 12px;
      align-items: center;
    }

    .c-pwd-gen__complexity-checkbox {
      min-height: 42px;
      display: flex;
      align-items: center;
      gap: 26px;
      flex-wrap: wrap;
    }

    .c-pwd-gen__checkbox-wrapper {
      position: relative;
      display: inline-flex;
      align-items: center;
    }

    .c-pwd-gen__custom-control-input {
      position: absolute;
      opacity: 0;
      pointer-events: none;
    }

    .c-pwd-gen__custom-control-label {
      position: relative;
      min-height: 25px;
      display: inline-flex;
      align-items: center;
      padding-left: 35px;
      color: #071926;
      font-size: 18px;
      line-height: 25px;
      font-weight: 850;
      cursor: pointer;
      user-select: none;
      transition: color 0.18s var(--ease);
    }

    .c-pwd-gen__custom-control-label::before {
      content: "";
      position: absolute;
      left: 0;
      top: 50%;
      width: 25px;
      height: 25px;
      border-radius: 7px;
      border: 1.4px solid rgba(155, 171, 187, 0.62);
      background: rgba(255, 255, 255, 0.75);
      transform: translateY(-50%);
      transition: border-color 0.18s var(--ease), background 0.18s var(--ease), box-shadow 0.18s var(--ease);
    }

    .c-pwd-gen__custom-control-label::after {
      content: "";
      position: absolute;
      left: 7px;
      top: 50%;
      width: 10px;
      height: 6px;
      border-left: 2px solid var(--blue);
      border-bottom: 2px solid var(--blue);
      transform: translateY(-64%) rotate(-45deg) scale(0.72);
      opacity: 0;
      transition: opacity 0.18s var(--ease), transform 0.18s var(--ease);
    }

    .c-pwd-gen__custom-control-input:checked + .c-pwd-gen__custom-control-label::before {
      border-color: var(--blue);
      background: rgba(255, 255, 255, 0.95);
      box-shadow: 0 8px 20px rgba(0, 113, 227, 0.1);
    }

    .c-pwd-gen__custom-control-input:checked + .c-pwd-gen__custom-control-label::after {
      opacity: 1;
      transform: translateY(-64%) rotate(-45deg) scale(1);
    }

    .merged-input {
      width: 100%;
      max-width: 420px;
      height: 44px;
      border: 1px solid var(--line-strong);
      background: rgba(255, 255, 255, 0.74);
      border-radius: 999px;
      outline: none;
      padding: 0 18px;
      color: #071926;
      font-size: 15px;
      font-weight: 520;
      box-shadow: 0 8px 22px rgba(7, 25, 38, 0.035);
      transition:
        border-color 0.22s var(--ease),
        box-shadow 0.22s var(--ease),
        background 0.22s var(--ease),
        transform 0.22s var(--ease);
    }

    .merged-input:hover {
      background: rgba(255, 255, 255, 0.9);
    }

    .merged-input:focus {
      border-color: rgba(0, 113, 227, 0.75);
      background: #fff;
      box-shadow: 0 0 0 4px rgba(0, 113, 227, 0.12), 0 14px 28px rgba(7, 25, 38, 0.055);
      transform: translateY(-1px);
    }

    .merged-input.count {
      height: 42px;
      text-align: center;
      font-weight: 850;
      padding: 0 16px;
    }

    .merged-actions {
      grid-column: 1 / -1;
      margin-top: 32px;
      padding-top: 28px;
      border-top: 1px solid rgba(145, 160, 175, 0.22);
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 14px;
      flex-wrap: wrap;
    }

    .merged-btn {
      height: 44px;
      min-width: 104px;
      padding: 0 22px;
      border-radius: 999px;
      border: 1px solid var(--line-strong);
      background: rgba(255, 255, 255, 0.72);
      color: var(--ink);
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-size: 15px;
      font-weight: 850;
      backdrop-filter: blur(18px);
      transition:
        transform 0.22s var(--ease),
        background 0.22s var(--ease),
        border-color 0.22s var(--ease),
        color 0.22s var(--ease),
        box-shadow 0.22s var(--ease);
    }

    .merged-btn.primary {
      border-color: rgba(0, 156, 140, 0.65);
      background: linear-gradient(180deg, #00a896, #008f80);
      color: #fff;
      box-shadow: 0 14px 30px rgba(0, 156, 140, 0.22);
    }

    .merged-btn.primary:hover {
      background: linear-gradient(180deg, #00ad9a, #008576);
      transform: translateY(-2px);
      box-shadow: 0 18px 36px rgba(0, 156, 140, 0.28);
    }

    .merged-btn.secondary:hover {
      color: var(--blue);
      border-color: rgba(0, 113, 227, 0.48);
      background: rgba(255, 255, 255, 0.95);
      transform: translateY(-2px);
      box-shadow: 0 14px 28px rgba(7, 25, 38, 0.07);
    }

    .merged-btn:active {
      transform: scale(0.97);
    }

    .merged-result {
      grid-column: 1 / -1;
      width: 100%;
      margin-top: 0;
      max-height: 0;
      opacity: 0;
      transform: translateY(18px) scale(0.985);
      overflow: hidden;
      pointer-events: none;
      border: 1px solid rgba(145, 160, 175, 0.24);
      border-radius: 26px;
      background: var(--card);
      box-shadow: var(--shadow-soft);
      backdrop-filter: blur(22px);
      transition:
        max-height 0.7s var(--ease),
        opacity 0.45s var(--ease),
        transform 0.55s var(--ease),
        margin-top 0.55s var(--ease);
    }

    body.result-ready .merged-result {
      margin-top: 24px;
      max-height: 390px;
      opacity: 1;
      transform: translateY(0) scale(1);
      pointer-events: auto;
    }

    .merged-result-head {
      height: 52px;
      padding: 0 24px;
      border-bottom: 1px solid rgba(145, 160, 175, 0.2);
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 14px;
      background: rgba(255, 255, 255, 0.46);
    }

    .merged-result-head strong {
      color: #071926;
      font-size: 16px;
      font-weight: 850;
    }

    .merged-result-head span {
      color: var(--muted);
      font-size: 13px;
    }

    .merged-result textarea {
      width: 100%;
      height: 285px;
      border: 0;
      outline: 0;
      resize: none;
      background: rgba(255, 255, 255, 0.66);
      padding: 18px 24px 24px;
      color: #071926;
      font-size: 14px;
      line-height: 1.75;
      font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, "Liberation Mono", monospace;
      overflow: auto;
      scrollbar-width: thin;
      scrollbar-color: rgba(116, 128, 142, 0.35) transparent;
    }

    .merged-result textarea::-webkit-scrollbar {
      width: 11px;
    }

    .merged-result textarea::-webkit-scrollbar-track {
      background: transparent;
    }

    .merged-result textarea::-webkit-scrollbar-thumb {
      background: rgba(116, 128, 142, 0.3);
      border: 3px solid rgba(255, 255, 255, 0.82);
      border-radius: 999px;
    }

    .merged-result textarea::-webkit-scrollbar-thumb:hover {
      background: rgba(92, 105, 120, 0.48);
    }

    .merged-result textarea::placeholder {
      color: #8b98a5;
    }

    @keyframes fadeUp {
      from {
        opacity: 0;
        transform: translateY(18px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @keyframes imageSoftIn {
      from {
        opacity: 0;
        transform: translateY(4px) scale(0.985);
      }
      to {
        opacity: 1;
        transform: translateY(0) scale(1);
      }
    }

    @media (max-width: 1024px) {
      body {
        height: auto;
        overflow-y: auto;
      }

      .page {
        padding: 42px 24px 54px;
      }

      .c-pwd-gen {
        margin-top: 46px;
      }

      .c-pwd-gen__container {
        grid-template-columns: 1fr;
        row-gap: 26px;
        justify-items: center;
      }

      .c-pwd-gen__main-fields {
        width: 100%;
        max-width: 760px;
      }

      .c-pwd-gen__length-settings,
      .c-pwd-gen__complexity-settings,
      .c-pwd-gen__extra-settings {
        grid-template-columns: 1fr;
        row-gap: 10px;
        min-height: auto;
      }

      .c-pwd-gen__slider-settings,
      .merged-input {
        max-width: 100%;
      }

      .batch-count-control {
        max-width: 360px;
      }

      .merged-actions,
      .merged-result {
        width: 100%;
      }
    }

    @media (max-width: 640px) {
      .page {
        padding: 34px 18px 48px;
      }

      .page-header h1 {
        font-size: 34px;
      }

      .page-header p {
        font-size: 14px;
      }

      .c-pwd-gen {
        margin-top: 34px;
      }

      .c-pwd-gen__illustrations {
        width: 100%;
        max-width: 370px;
        height: 252px;
      }

      .c-pwd-gen__illustrations-image {
        width: 100%;
      }

      .preview-box {
        height: auto;
        min-height: 56px;
        padding: 14px 20px;
        align-items: flex-start;
        flex-direction: column;
        gap: 8px;
        border-radius: 24px;
      }

      .preview-title {
        font-size: 14px;
      }

      .preview-password {
        width: 100%;
        font-size: 16px;
      }

      .c-pwd-gen__settings {
        margin-top: 28px;
        row-gap: 21px;
      }

      .c-pwd-gen__slider-settings {
        grid-template-columns: 42px minmax(0, 1fr) 42px;
        gap: 10px;
      }

      .c-pwd-gen__complexity-checkbox {
        display: grid;

  <script>
    const generator = document.getElementById("randompasswordgenerator-06e6ead186");
    const previewPassword = document.getElementById("previewPassword");
    const slider = generator.querySelector(".c-pwd-gen__slider");
    const sliderFill = generator.querySelector(".c-pwd-gen__slider-fill");
    const sliderThumb = generator.querySelector(".c-pwd-gen__slider-thumb");
    const lengthValue = generator.querySelector(".c-pwd-gen__length-value");
    const decrementBtn = generator.querySelector(".c-pwd-gen--decrement");
    const incrementBtn = generator.querySelector(".c-pwd-gen--increment");

    const uppercase = generator.querySelector(".c-pwd-gen__uppercase");
    const lowercase = generator.querySelector(".c-pwd-gen__lowercase");
    const numbers = generator.querySelector(".c-pwd-gen__numbers");
    const specials = generator.querySelector(".c-pwd-gen__specials");

    const batchCount = document.getElementById("batchCount");
    const countMinus = document.getElementById("countMinus");
    const countPlus = document.getElementById("countPlus");
    const includeChars = document.getElementById("includeChars");
    const excludeChars = document.getElementById("excludeChars");
    const generateBatch = document.getElementById("generateBatch");
    const copyBatch = document.getElementById("copyBatch");
    const downloadBatch = document.getElementById("downloadBatch");
    const clearBatch = document.getElementById("clearBatch");
    const batchResult = document.getElementById("batchResult");
    const resultStatus = document.getElementById("resultStatus");

    const charSets = {
      uppercase: "ABCDEFGHIJKLMNOPQRSTUVWXYZ",
      lowercase: "abcdefghijklmnopqrstuvwxyz",
      numbers: "0123456789",
      specials: "!@#$%^&*()_+-=[]{}|;:,.<>?"
    };

    function getRandomInt(max) {
      if (max <= 0) return 0;

      if (window.crypto && window.crypto.getRandomValues) {
        const array = new Uint32Array(1);
        window.crypto.getRandomValues(array);
        return array[0] % max;
      }

      return Math.floor(Math.random() * max);
    }

    function uniqueText(text) {
      return Array.from(new Set(String(text).split(""))).join("");
    }

    function removeExcludedChars(text, exclude) {
      if (!exclude) return text;
      const excluded = new Set(String(exclude).split(""));
      return String(text).split("").filter(char => !excluded.has(char)).join("");
    }

    function shuffleArray(arr) {
      const copy = arr.slice();

      for (let i = copy.length - 1; i > 0; i--) {
        const j = getRandomInt(i + 1);
        const temp = copy[i];
        copy[i] = copy[j];
        copy[j] = temp;
      }

      return copy;
    }

    function getSelectedPool() {
      let pool = "";

      if (uppercase.checked) pool += charSets.uppercase;
      if (lowercase.checked) pool += charSets.lowercase;
      if (numbers.checked) pool += charSets.numbers;
      if (specials.checked) pool += charSets.specials;

      pool = removeExcludedChars(pool, excludeChars.value);
      return uniqueText(pool);
    }

    function getIncludeChars() {
      return uniqueText(removeExcludedChars(includeChars.value, excludeChars.value));
    }

    function getSafePool() {
      const pool = getSelectedPool();
      const include = getIncludeChars();

      if (pool) return pool;
      if (include) return include;

      lowercase.checked = true;

      const backup = removeExcludedChars(
        charSets.lowercase + charSets.uppercase + charSets.numbers + charSets.specials,
        excludeChars.value
      );

      return uniqueText(backup) || "ABCDEFGHJKLMNPQRSTUVWXYZabcdefghijkmnpqrstuvwxyz23456789";
    }

    function createPasswordByOptions(length) {
      const pool = uniqueText(getSafePool());
      const include = getIncludeChars();
      const available = uniqueText(pool + include);
      const finalLength = Math.min(length, available.length);

      if (finalLength <= 0) return "";

      const required = include
        .split("")
        .filter(char => available.includes(char))
        .slice(0, finalLength);

      const used = new Set(required);
      const rest = available
        .split("")
        .filter(char => !used.has(char));

      const shuffledRest = shuffleArray(rest);
      const need = finalLength - required.length;
      const selected = required.concat(shuffledRest.slice(0, need));

      return shuffleArray(selected).join("");
    }

    function getAvailableCount() {
      const pool = getSafePool();
      const include = getIncludeChars();
      return uniqueText(pool + include).length;
    }

    function getScore() {
      const length = Number(slider.value);

      if (length <= 3) return "very-weak";
      if (length <= 6) return "weak";
      if (length <= 8) return "good";
      if (length <= 10) return "strong";
      return "very-strong";
    }

    function updateScore() {
      generator.dataset.score = getScore();
    }

    function updateSliderButtons() {
      const value = Number(slider.value);
      decrementBtn.disabled = value <= Number(slider.min);
      incrementBtn.disabled = value >= Number(slider.max);
    }

    function updateSliderView() {
      const min = Number(slider.min);
      const max = Number(slider.max);
      const value = Number(slider.value);
      const percent = ((value - min) / (max - min)) * 100;
      const offset = 21 - percent * 0.42;

      lengthValue.textContent = value;
      sliderFill.style.width = percent + "%";
      sliderThumb.style.left = `calc(${percent}% + ${offset}px)`;

      updateScore();
      updateSliderButtons();
    }

    function updatePreviewPassword() {
      previewPassword.textContent = createPasswordByOptions(Number(slider.value));
      updateScore();
    }

    function setLength(value) {
      const min = Number(slider.min);
      const max = Number(slider.max);

      slider.value = Math.max(min, Math.min(max, value));
      updateSliderView();
      updatePreviewPassword();
    }

    function preventAllUnchecked(changedInput) {
      const inputs = [uppercase, lowercase, numbers, specials];

      if (!inputs.some(input => input.checked)) {
        changedInput.checked = true;
      }
    }

    function setCount(value) {
      const min = Number(batchCount.min);
      const max = Number(batchCount.max);
      const next = Math.max(min, Math.min(max, Number(value) || min));

      batchCount.value = next;
    }

    decrementBtn.addEventListener("click", () => {
      setLength(Number(slider.value) - 1);
    });

    incrementBtn.addEventListener("click", () => {
      setLength(Number(slider.value) + 1);
    });

    slider.addEventListener("input", () => {
      updateSliderView();
      updatePreviewPassword();
    });

    [uppercase, lowercase, numbers, specials].forEach(input => {
      input.addEventListener("change", () => {
        preventAllUnchecked(input);
        updatePreviewPassword();
      });
    });

    includeChars.addEventListener("input", updatePreviewPassword);
    excludeChars.addEventListener("input", updatePreviewPassword);

    countMinus.addEventListener("click", () => {
      setCount(Number(batchCount.value) - 100);
    });

    countPlus.addEventListener("click", () => {
      setCount(Number(batchCount.value) + 100);
    });

    batchCount.addEventListener("change", () => {
      setCount(batchCount.value);
    });

    generateBatch.addEventListener("click", () => {
      const count = Math.max(1, Math.min(100000, Number(batchCount.value) || 1));
      const targetLength = Number(slider.value);
      const availableCount = getAvailableCount();
      const actualLength = Math.min(targetLength, availableCount);
      const result = [];

      generateBatch.disabled = true;
      generateBatch.textContent = "生成中...";
      resultStatus.textContent = "正在生成...";

      setTimeout(() => {
        for (let i = 0; i < count; i++) {
          result.push(createPasswordByOptions(targetLength));
        }

        batchResult.value = result.join("\r\n");

        if (actualLength < targetLength) {
          resultStatus.textContent = `已生成 ${result.length} 条，可用字符不足，实际长度 ${actualLength}`;
        } else {
          resultStatus.textContent = `已生成 ${result.length} 条，长度 ${targetLength}`;
        }

        document.body.classList.add("result-ready");

        setTimeout(() => {
          document.querySelector(".merged-result").scrollIntoView({
            behavior: "smooth",
            block: "nearest"
          });
        }, 180);

        generateBatch.disabled = false;
        generateBatch.textContent = "生成密码";
      }, 120);
    });

    copyBatch.addEventListener("click", async () => {
      if (!batchResult.value.trim()) {
        resultStatus.textContent = "没有可复制的结果";
        return;
      }

      const excelText = batchResult.value
        .split(/\r?\n/)
        .filter(line => line.trim() !== "")
        .join("\r\n");

      try {
        await navigator.clipboard.writeText(excelText);
      } catch {
        batchResult.value = excelText;
        batchResult.select();
        document.execCommand("copy");
      }

      resultStatus.textContent = "结果已复制，可直接粘贴到 Excel";
    });

    downloadBatch.addEventListener("click", () => {
      if (!batchResult.value.trim()) {
        resultStatus.textContent = "没有可下载的结果";
        return;
      }

      const text = batchResult.value
        .split(/\r?\n/)
        .filter(line => line.trim() !== "")
        .join("\r\n");

      const blob = new Blob([text], { type: "text/plain;charset=utf-8" });
      const url = URL.createObjectURL(blob);
      const link = document.createElement("a");
      const now = new Date();
      const pad = value => String(value).padStart(2, "0");
      const fileName = `随机密码-${now.getFullYear()}${pad(now.getMonth() + 1)}${pad(now.getDate())}-${pad(now.getHours())}${pad(now.getMinutes())}.txt`;

      link.href = url;
      link.download = fileName;
      document.body.appendChild(link);
      link.click();
      link.remove();
      URL.revokeObjectURL(url);

      resultStatus.textContent = "TXT 已下载";
    });

    clearBatch.addEventListener("click", () => {
      batchResult.value = "";
      resultStatus.textContent = "已清空";
      document.body.classList.remove("result-ready");
      window.scrollTo({
        top: 0,
        behavior: "smooth"
      });
    });

    slider.value = 10;
    batchCount.value = 1000;
    updateSliderView();
    updatePreviewPassword();
  </script>
</body>
</html>
